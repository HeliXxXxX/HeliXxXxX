<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#2a0505"/>
      <stop offset="55%" stop-color="#120202"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="redline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#B01818"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="220" fill="url(#glow)"/>

  <!-- faint pentagram, left -->
  <g transform="translate(120,110)" stroke="#3a0808" stroke-width="1.4" fill="none" opacity="0.55">
    <circle r="60"/>
    <polygon points="0,-58 34,47 -55,-18 55,-18 -34,47"/>
  </g>

  <!-- faint pentagram, right -->
  <g transform="translate(880,110)" stroke="#3a0808" stroke-width="1.4" fill="none" opacity="0.55">
    <circle r="60"/>
    <polygon points="0,-58 34,47 -55,-18 55,-18 -34,47"/>
  </g>

  <!-- title -->
  <text x="500" y="98" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="700" fill="#e8e8e8" filter="url(#f)"
        letter-spacing="4">HeliX</text>

  <text x="500" y="138" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="15" fill="#B01818" letter-spacing="6">HARDWARE · CODE · CHAOS</text>

  <!-- red underline -->
  <rect x="330" y="158" width="340" height="2" fill="url(#redline)"/>

  <!-- star accents -->
  <text x="315" y="162" font-size="14" fill="#B01818">✦</text>
  <text x="672" y="162" font-size="14" fill="#B01818">✦</text>
</svg>
